name: Build Aziz Wind Tunnel APK

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: APK yaratish (Kivy Docker)
      run: |
        docker run --rm \
          -v ${{ github.workspace }}:/home/user/hostcwd \
          --workdir /home/user/hostcwd \
          kivy/buildozer:latest \
          android debug

    - name: APK yuklash
      uses: actions/upload-artifact@v4
      with:
        name: AzizWindTunnel-APK
        path: bin/*.apk
        if-no-files-found: error
