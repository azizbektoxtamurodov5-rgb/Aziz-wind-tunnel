    - name: APK yaratish
      env:
        USE_CCACHE: "0"
        CCACHE_DISABLE: "1"
        JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64
      run: |
        buildozer android debug 2>&1 || (find . -name "*.log" | head -5 && exit 1)

    - name: Xato log saqlash
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: build-logs
        path: |
          .buildozer/**/*.log
        if-no-files-found: ignore
